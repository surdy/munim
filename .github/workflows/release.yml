# munim release pipeline (BUILD_SPEC §7, §0.5 #16–20). Triggers on a v* tag.
#
# Two independent update channels by design:
#   • macOS → Developer-ID-signed + notarized .dmg, plus a tauri-updater `latest.json`
#     attached to the GitHub Release (in-app auto-update).
#   • Linux → Flatpak, exported to an OSTree repo published on GitHub Pages (Flatpak
#     handles updates there; tauri-updater is disabled on Linux).
#
# Required repo secrets (see RELEASE.md / issue #14 — none of this runs without them):
#   Developer ID sign + notarize:
#     APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#     APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   Updater signing (minisign):
#     TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release + upload assets
  pages: write # deploy the Flatpak OSTree repo to Pages
  id-token: write # Pages deployment (OIDC)

jobs:
  macos:
    name: macOS (signed dmg + updater)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # tauri-action builds the universal .dmg, code-signs + notarizes it (Apple env below),
      # signs the updater artifact (TAURI_SIGNING_* env), creates a draft GitHub Release for
      # the tag, and uploads the .dmg + .app.tar.gz + .sig + latest.json to it.
      - uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'munim ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target universal-apple-darwin

  linux-flatpak:
    name: Linux (Flatpak → Pages repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev flatpak flatpak-builder
      - run: npm install
      # 1) Build the self-contained release binary (frontend is embedded; pricing falls back
      #    to the embedded default). No Tauri bundle — the Flatpak packages the binary.
      - name: Build binary
        run: npm run tauri build -- --no-bundle
      # 2) Stage the files the Flatpak manifest installs.
      - name: Stage Flatpak inputs
        run: |
          STAGE=src-tauri/flatpak/staging
          mkdir -p "$STAGE"
          cp src-tauri/target/release/munim "$STAGE/munim"
          cp src-tauri/flatpak/io.github.surdy.munim.desktop "$STAGE/"
          cp src-tauri/flatpak/io.github.surdy.munim.metainfo.xml "$STAGE/"
          cp src-tauri/icons/128x128.png "$STAGE/128x128.png"
          cp src-tauri/icons/128x128@2x.png "$STAGE/256x256.png"
      # 3) Build the Flatpak into an OSTree repo.
      - name: Build Flatpak
        run: |
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --install-deps-from=flathub --force-clean \
            --repo=repo build-dir src-tauri/flatpak/io.github.surdy.munim.yml
          flatpak build-update-repo repo
      # 4) Emit the .flatpakrepo pointer users add once, then publish repo/ to Pages.
      - name: Prepare Pages artifact
        run: |
          cat > repo/index.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=munim
          Url=https://surdy.github.io/munim/
          Homepage=https://github.com/surdy/munim
          Description=munim — AI-coding usage & cost tracker
          GPGKey=
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo
      - uses: actions/deploy-pages@v4
