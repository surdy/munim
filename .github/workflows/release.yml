# munim release pipeline (BUILD_SPEC §0.5 #16-20, §7).
# STUB: fill in the secrets and TODO steps before first use.
#
# Two independent update channels by design:
#   • macOS → signed + notarized .dmg, plus a tauri-updater `latest.json` on the GitHub Release.
#   • Linux → Flatpak, exported to an OSTree repo published on GitHub Pages.
#
# Required repo secrets:
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID           # Developer ID sign + notarize
#   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD  # minisign updater key
name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  macos:
    name: macOS (dmg + updater manifest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # Builds, signs, notarizes, produces the .dmg AND the updater signature + latest.json,
      # and uploads everything to the GitHub Release for this tag.
      - uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target universal-apple-darwin
          # tauri-action attaches artifacts + latest.json to the release.
          releaseId: ${{ github.event.release.id }}
          includeUpdaterJson: true
      # TODO(spec §7): ensure latest.json is uploaded as `latest.json` on the release so the
      #   updater endpoint (github.com/OWNER/munim/releases/latest/download/latest.json) resolves.

  linux-flatpak:
    name: Linux (Flatpak → GitHub Pages repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # WebKitGTK + build deps for Tauri on Linux.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev flatpak flatpak-builder
      - run: npm install
      # 1) Build the Tauri Linux binary/.deb that the Flatpak manifest installs.
      - name: Build Tauri binary
        run: npm run tauri build -- --bundles deb
      # 2) Build the Flatpak from src-tauri/flatpak/com.munim.app.yml into a local OSTree repo.
      - name: Build Flatpak
        run: |
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          # TODO(spec §7): wire the built .deb/binary into the manifest sources, then:
          # flatpak-builder --user --install-deps-from=flathub --repo=repo --force-clean \
          #   build-dir src-tauri/flatpak/com.munim.app.yml
      # 3) Publish the OSTree `repo/` to GitHub Pages so users can `flatpak remote-add` it
      #    and receive auto-updates. Also emit index.flatpakrepo.
      - name: Publish repo to Pages
        run: |
          echo "TODO(spec §7): flatpak build-update-repo repo/ ; then deploy repo/ to gh-pages"
