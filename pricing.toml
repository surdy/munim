# munim pricing tables — USD per 1,000,000 tokens.
# Edit these rates freely; munim reads this file at startup, no recompile needed.
# Matching is lowercased-substring and ORDER-SENSITIVE: the first `match` that is a
# substring of the model id wins. Keep more-specific rows above less-specific ones.
# See BUILD_SPEC.md §4.5.

